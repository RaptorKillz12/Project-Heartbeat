name: Export Project Heartbeat Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Project Heartbeat
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk unzip
          python -m pip install --upgrade pip
          pip install scons

      - name: Clone Shinobu
        run: |
          git clone --recursive https://github.com/EIRTeam/shinobu.git

      - name: Build Shinobu editor
        working-directory: shinobu
        run: |
          scons platform=linuxbsd target=editor -j$(nproc)

      - name: Import Project Heartbeat
        run: |
          ./shinobu/bin/*editor* --headless --path . --quit

      - name: Export Android
        run: |
          mkdir -p build
          ./shinobu/bin/*editor* \
            --headless \
            --path . \
            --export-release "Android" \
            build/ProjectHeartbeat.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjectHeartbeat-Android
          path: build/ProjectHeartbeat.apk
